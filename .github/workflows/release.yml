name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check src tests lambda infrastructure

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]  # ex: v0.1.1
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = data["project"]["version"]
          if actual != expected:
              raise SystemExit(
                  f"Tag/version mismatch: tag={ref_name}, pyproject version={actual}. "
                  "Update one of them before releasing."
              )
          print(f"Tag/version check passed: {ref_name}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (Trusted Publisher)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Publish to PyPI (API token fallback)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
