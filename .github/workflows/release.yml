name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check src tests lambda infrastructure

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]  # ex: v0.1.1
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = data["project"]["version"]
          if actual != expected:
              raise SystemExit(
                  f"Tag/version mismatch: tag={ref_name}, pyproject version={actual}. "
                  "Update one of them before releasing."
              )
          print(f"Tag/version check passed: {ref_name}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  integration:
    needs: build
    uses: ./.github/workflows/integration-tests.yml
    with:
      aws_region: us-east-1
      sentinel_stack_name: SentinelCIIntegrationTest-${{ github.run_id }}
      example_api_function_name: sentinel-example-api-ci-${{ github.run_id }}
      example_api_stack_name: sentinel-example-api-ci-${{ github.run_id }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      SENTINEL_API_JWT_SECRET_KEY: ${{ secrets.SENTINEL_API_JWT_SECRET_KEY }}

  publish_gateway_image:
    runs-on: ubuntu-latest
    needs: [build, integration]
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      GATEWAY_IMAGE_REPOSITORY: public.ecr.aws/n6a2e6z3/sentinel-api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR Public repository exists
        run: |
          aws ecr-public describe-repositories \
            --region us-east-1 \
            --repository-names sentinel-api-gateway >/dev/null 2>&1 || \
          aws ecr-public create-repository \
            --region us-east-1 \
            --repository-name sentinel-api-gateway

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and push multi-arch gateway image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${GATEWAY_IMAGE_REPOSITORY}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            --push \
            .
          echo "Published image tags:"
          echo "- ${IMAGE}:${VERSION}"
          echo "- ${IMAGE}:latest"

  publish:
    runs-on: ubuntu-latest
    needs: [build, integration, publish_gateway_image]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
