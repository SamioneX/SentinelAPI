name: Deploy SentinelAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sentinelapi-deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  publish_arch_diagram:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Render architecture diagram (SVG)
        run: |
          mkdir -p build/diagrams
          npx -y @mermaid-js/mermaid-cli \
            -i diagrams/arch-diagram.mmd \
            -o build/diagrams/arch-diagram.svg \
            -p .github/mermaid/puppeteer-config.json \
            -b transparent

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish diagram asset to S3
        env:
          ASSET_BUCKET_TAG: ${{ vars.ASSET_BUCKET_TAG }}
        run: |
          ./scripts/publish_arch_diagram.sh \
            build/diagrams/arch-diagram.svg \
            sentinelapi/diagrams/arch-diagram.svg \
            image/svg+xml

      - name: Publish sample usage markdown to S3
        env:
          ASSET_BUCKET_TAG: ${{ vars.ASSET_BUCKET_TAG }}
        run: |
          ./scripts/publish_arch_diagram.sh \
            sample-usage.md \
            sentinelapi/sample-usage.md \
            text/markdown

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ruff
        run: ruff check src tests lambda infrastructure

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  validate_templates:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Dry-run SDK deploy plan
        env:
          SENTINEL_API_UPSTREAM_BASE_URL: https://example.com
          SENTINEL_API_JWT_SECRET_KEY: ci-placeholder
        run: python infrastructure/deploy.py --mode full --stack-name SentinelCIIntegrationTest --dry-run

  deploy:
    if: github.ref == 'refs/heads/main' && vars.ENABLE_INTEGRATION_TESTS == 'true'
    needs: validate_templates
    uses: ./.github/workflows/integration-tests.yml
    with:
      aws_region: us-east-1
      sentinel_stack_name: SentinelCIIntegrationTest-${{ github.run_id }}
      example_api_function_name: sentinel-example-api-ci-${{ github.run_id }}
      example_api_stack_name: sentinel-example-api-ci-${{ github.run_id }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      SENTINEL_API_JWT_SECRET_KEY: ${{ secrets.SENTINEL_API_JWT_SECRET_KEY }}
