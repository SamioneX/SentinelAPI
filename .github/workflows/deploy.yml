name: Deploy SentinelAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ruff
        run: ruff check src tests lambda sdk_impl

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  validate_templates:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Dry-run SDK deploy plan
        env:
          SENTINEL_API_UPSTREAM_BASE_URL: https://example.com
          SENTINEL_API_JWT_SECRET_KEY: ci-placeholder
        run: python sdk_impl/deploy.py --mode full --stack-name SentinelSdkFull --dry-run

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate_templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          sudo apt-get update
          sudo apt-get install -y docker.io

      - name: Start Docker daemon
        run: sudo systemctl start docker

      - name: Deploy SDK full stack
        env:
          SENTINEL_API_UPSTREAM_BASE_URL: ${{ secrets.SENTINEL_API_UPSTREAM_BASE_URL }}
          SENTINEL_API_JWT_SECRET_KEY: ${{ secrets.SENTINEL_API_JWT_SECRET_KEY }}
        run: ./deploy.sh

      - name: Smoke test deployed stack
        env:
          STACK_NAME: SentinelSdkFull
          SMOKE_JWT_SECRET_KEY: ${{ secrets.SENTINEL_API_JWT_SECRET_KEY }}
        run: ./scripts/smoke_aws.sh "${STACK_NAME}"
