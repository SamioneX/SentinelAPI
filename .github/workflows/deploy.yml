name: Deploy SentinelAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ruff
        run: ruff check src tests lambda infrastructure/cdk

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  synth:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/cdk/requirements.txt
          pip install -e .
          npm install -g aws-cdk

      - name: CDK synth
        working-directory: infrastructure/cdk
        run: cdk synth SentinelStack

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: synth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/cdk/requirements.txt
          pip install -e .
          npm install -g aws-cdk

      - name: Deploy stack
        working-directory: infrastructure/cdk
        run: cdk deploy SentinelStack --require-approval never

      - name: Smoke test deployed stack
        env:
          STACK_NAME: SentinelStack
        run: ./scripts/smoke_aws.sh "${STACK_NAME}"
