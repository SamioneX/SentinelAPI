name: Deploy SentinelAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ruff
        run: ruff check src tests lambda infrastructure

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        env:
          SENTINEL_API_JWT_SECRET_KEY: test-secret
        run: pytest -q

  validate_templates:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Dry-run SDK deploy plan
        env:
          SENTINEL_API_UPSTREAM_BASE_URL: https://example.com
          SENTINEL_API_JWT_SECRET_KEY: ci-placeholder
        run: python infrastructure/deploy.py --mode full --stack-name SentinelSdkFull --dry-run

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate_templates
    uses: ./.github/workflows/integration-tests.yml
    with:
      aws_region: us-east-1
      sentinel_stack_name: SentinelSdkFull
      example_api_function_name: sentinel-example-api
      example_api_stack_name: sentinel-example-api-stack
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      SENTINEL_API_JWT_SECRET_KEY: ${{ secrets.SENTINEL_API_JWT_SECRET_KEY }}
